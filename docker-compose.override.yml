version: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["make", "dev"]
    volumes:
      - ./app:/app

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile